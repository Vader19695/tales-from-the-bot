name: Generate Weekly Story

on:
  # Every Sunday at 12:00 UTC.
  schedule:
    - cron: '0 12 * * 0'

  # Manual trigger — useful for testing or generating a story on demand.
  workflow_dispatch:
    inputs:
      prompt:
        description: >
          Story prompt to use. Leave blank to have the AI generate a prompt automatically.
        type: string
        required: false
        default: ''
      model:
        description: >
          Anthropic model to use for writing the story (e.g. claude-sonnet-4-5, claude-opus-4-5).
          Defaults to claude-sonnet-4-5 when left blank.
        type: string
        required: false
        default: ''
      commit_mode:
        description: |
          How to publish the generated story.
          "pr" opens a pull request for review before merging.
          "direct" commits directly to main (site deploys immediately).
        type: choice
        options:
          - pr
          - direct
        default: pr

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate story prompt
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pass the user-supplied prompt (empty string when not provided).
          CUSTOM_PROMPT: ${{ inputs.prompt }}
          # Use a lightweight model for the prompt-generation step.
          PROMPT_MODEL: claude-haiku-4-5
        run: npx tsx scripts/generate-prompt.ts

      - name: Generate story
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Scheduled runs always use the latest Claude Sonnet.
          # Manual runs use the caller-supplied model, falling back to Sonnet.
          LLM_MODEL: ${{ inputs.model || 'claude-sonnet-4-5' }}
        run: npx tsx scripts/generate-story.ts

      # ── Commit mode: pull request (default) ──────────────────────────────
      - name: Open pull request
        if: ${{ github.event.inputs.commit_mode != 'direct' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'story: add AI-generated story'
          branch: story/auto-generated-${{ github.run_id }}
          delete-branch: true
          title: 'New AI-generated story'
          body: |
            This pull request was automatically created by the **Generate Weekly Story** workflow.

            A new story has been generated and saved to `src/content/stories/`.
            Review the story and merge to publish it.

            _Triggered by: `${{ github.event_name }}`_
          labels: ai-generated

      # ── Commit mode: direct commit ────────────────────────────────────────
      - name: Commit directly to main
        if: ${{ github.event.inputs.commit_mode == 'direct' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'story: add AI-generated story'
          branch: main
