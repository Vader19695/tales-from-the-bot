<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="#2563eb"/>
  <!-- Icon -->
  <rect x="80" y="80" width="64" height="64" rx="12" fill="#2563eb"/>
  <text x="112" y="128" font-size="40" text-anchor="middle" fill="white" font-family="serif">✦</text>
  <!-- Title -->
  <text x="80" y="310" font-size="72" font-weight="700" fill="white" font-family="Georgia, serif" letter-spacing="-1">Tales From The Bot</text>
  <!-- Tagline -->
  <text x="80" y="380" font-size="32" fill="#94a3b8" font-family="Georgia, serif">AI-generated short stories, published every week.</text>
  <!-- Bottom URL -->
  <text x="80" y="560" font-size="24" fill="#475569" font-family="monospace">talesfromthebot.blog</text>
</svg>
