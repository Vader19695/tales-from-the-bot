<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e40af"/>
  <!-- Antenna post -->
  <rect x="15" y="4" width="2" height="5" rx="1" fill="white"/>
  <!-- Antenna ball -->
  <circle cx="16" cy="4" r="2.5" fill="#93c5fd"/>
  <!-- Robot head -->
  <rect x="7" y="9" width="18" height="15" rx="3" fill="white"/>
  <!-- Eyes -->
  <rect x="9" y="13" width="5" height="4" rx="1" fill="#2563eb"/>
  <rect x="18" y="13" width="5" height="4" rx="1" fill="#2563eb"/>
  <!-- Mouth / text lines (representing stories) -->
  <rect x="10" y="20" width="12" height="1.5" rx="0.75" fill="#bfdbfe"/>
</svg>
